  <mask id="imagine-text-gaps-artd87" maskUnits="userSpaceOnUse"><rect x="0" y="0" width="680" height="340" fill="white"/><rect x="306" y="121.4444351196289" width="141.0367889404297" height="56.13333511352539" fill="black" rx="2"/><rect x="306" y="166.44444274902344" width="142.48886108398438" height="56.13333511352539" fill="black" rx="2"/><rect x="307.24444580078125" y="217.91110229492188" width="263.41319274902344" height="19.111111640930176" fill="black" rx="2"/><rect x="568.1326293945312" y="148.95555114746094" width="19.21481704711914" height="16.088889122009277" fill="black" rx="2"/></mask></defs>


  <circle cx="200" cy="32" r="6" fill="url(#nodeGrad)" stroke="#EF9F27" stroke-width="1" style="stroke:rgb(239, 159, 39);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

[logger]
level = "warning"

[client]
toolbarMode = "viewer"
showErrorDetails = true

[server]
runOnSave = true
maxUploadSize = 200
enableXsrfProtection = true
headless = true
port = 8501

[browser]
gatherUsageStats = false

[theme]
primaryColor = "#1A73E8"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F0F2F6"
textColor = "#262730"
font = "sans serif"
